name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Debug - Check defineCommerceHandler in bundle
        run: |
          echo "=== Files in dist/_worker.js/ ==="
          find dist/_worker.js -name "*.mjs" -type f | head -20
          echo ""
          echo "=== defineCommerceHandler occurrences ==="
          grep -rn "defineCommerceHandler" dist/_worker.js/ || echo "NOT FOUND!"
          echo ""
          echo "=== First 5 lines of nitro.mjs ==="
          head -5 dist/_worker.js/chunks/nitro/nitro.mjs 2>/dev/null || echo "nitro.mjs not found"
          echo ""
          echo "=== Function definition check ==="
          grep -c "function defineCommerceHandler" dist/_worker.js/chunks/nitro/nitro.mjs 2>/dev/null || echo "defineCommerceHandler function NOT defined"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: '4'
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CF_PAGES_PROJECT_NAME }} --branch=${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }} --commit-hash=${{ github.sha }}
