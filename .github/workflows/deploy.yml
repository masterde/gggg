name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Debug - Check defineCommerceHandler in bundle
        run: |
          echo "=== defineCommerceHandler in .mjs files (not maps) ==="
          grep -rn "defineCommerceHandler" dist/_worker.js/ --include="*.mjs" || echo "NOT FOUND in any .mjs!"
          echo ""
          echo "=== function definition check ==="
          grep -c "function defineCommerceHandler" dist/_worker.js/chunks/nitro/nitro.mjs || echo "NO function defineCommerceHandler"
          echo ""
          echo "=== How defineCommerceHandler appears in nitro.mjs ==="
          grep -o ".\{0,50\}defineCommerceHandler.\{0,50\}" dist/_worker.js/chunks/nitro/nitro.mjs | head -5
          echo ""
          echo "=== nitro.mjs size ==="
          wc -c dist/_worker.js/chunks/nitro/nitro.mjs
          echo ""
          echo "=== index.js content ==="
          cat dist/_worker.js/index.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: '4'
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CF_PAGES_PROJECT_NAME }} --branch=${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }} --commit-hash=${{ github.sha }}
