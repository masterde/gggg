name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Debug - Verify bundle
        run: |
          echo "=== nitro.mjs size ==="
          wc -c dist/_worker.js/chunks/nitro/nitro.mjs
          echo "=== defineCommerceHandler count in nitro.mjs ==="
          grep -co "defineCommerceHandler" dist/_worker.js/chunks/nitro/nitro.mjs || echo "0"
          echo "=== index.js ==="
          cat dist/_worker.js/index.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy dist \
            --project-name=${{ secrets.CF_PAGES_PROJECT_NAME }} \
            --branch=${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }} \
            --commit-hash=${{ github.sha }}
